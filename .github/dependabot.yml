version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    commit-message:
      prefix: chore
    labels: []
    groups:
      rust:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    commit-message:
      prefix: chore
    labels: []
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
